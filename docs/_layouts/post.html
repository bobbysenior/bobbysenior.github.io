---
layout: default
---
<article class="post">
    <header class="post-header">
        <p class="back">
            <a href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a>
        </p>
        <h1>{{ page.title }}</h1>
        <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    </header>

    {{ content }}
</article>
