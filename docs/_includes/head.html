<head>
    <meta charset="utf-8" />
    <script>
        // Appliquer le thème avant le rendu pour éviter tout flash
        (function () {
            try {
                var saved = localStorage.getItem("theme");
                var theme =
                    saved ||
                    (window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: light)").matches
                        ? "light"
                        : "dark");
                if (theme === "light") {
                    document.documentElement.setAttribute("data-theme", "light");
                }
            } catch (e) {}
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% if page.noindex %}<meta name="robots" content="noindex" />{% endif %}
    <title>al3ph_zero{% if page.title and page.title != "" %} — {{ page.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
    {% if page.layout == "post" %}
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["$", "$"], ["\\(", "\\)"]],
                displayMath: [["$$", "$$"], ["\\[", "\\]"]],
            },
            options: {
                // Ne pas interpréter les $ à l'intérieur des blocs de code
                skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
            },
        };
    </script>
    <script
        id="MathJax-script"
        async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    {% endif %}
</head>
